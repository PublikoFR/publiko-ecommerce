services:
    app:
        build:
            context: ./docker/app
            dockerfile: Dockerfile
            args:
                UID: ${UID:-1000}
                GID: ${GID:-1000}
        container_name: mde-laravel-app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
            - ./docker/app/php.ini:/usr/local/etc/php/conf.d/zz-mde.ini:ro
        environment:
            APP_ENV: ${APP_ENV:-local}
            APP_DEBUG: ${APP_DEBUG:-true}
            PHP_IDE_CONFIG: serverName=mde-laravel
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_started
        networks:
            - backend
            - traefik_network
        labels:
            - traefik.enable=true
            - traefik.docker.network=traefik_network
            - traefik.http.routers.mde-laravel.rule=Host(`mde-laravel.localhost`)
            - traefik.http.routers.mde-laravel.entrypoints=web
            - traefik.http.services.mde-laravel.loadbalancer.server.port=80

    mysql:
        image: mysql:8.0
        container_name: mde-laravel-mysql
        restart: unless-stopped
        command: --default-authentication-plugin=caching_sha2_password
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
            MYSQL_DATABASE: ${DB_DATABASE:-mde}
            MYSQL_USER: ${DB_USERNAME:-mde}
            MYSQL_PASSWORD: ${DB_PASSWORD:-mde_password}
        volumes:
            - mysql_data:/var/lib/mysql
            - ./docker/mysql/my.cnf:/etc/mysql/conf.d/zz-mde.cnf:ro
        networks:
            - backend
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${DB_ROOT_PASSWORD:-root_password}']
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: mde-laravel-redis
        restart: unless-stopped
        volumes:
            - redis_data:/data
        networks:
            - backend

    phpmyadmin:
        image: phpmyadmin:latest
        container_name: mde-laravel-pma
        restart: unless-stopped
        environment:
            PMA_HOST: mysql
            PMA_USER: root
            PMA_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
            UPLOAD_LIMIT: 256M
        depends_on:
            mysql:
                condition: service_healthy
        networks:
            - backend
            - traefik_network
        labels:
            - traefik.enable=true
            - traefik.docker.network=traefik_network
            - traefik.http.routers.mde-laravel-pma.rule=Host(`pma.mde-laravel.localhost`)
            - traefik.http.routers.mde-laravel-pma.entrypoints=web
            - traefik.http.services.mde-laravel-pma.loadbalancer.server.port=80

networks:
    backend:
        driver: bridge
    traefik_network:
        external: true

volumes:
    mysql_data:
        driver: local
    redis_data:
        driver: local
